upstream backend_upstream {
  server backend:5000;
}

server {
  listen 80;
  server_name _;

  # Static SPA assets
  root /usr/share/nginx/html;
  index index.html;

  # Long-lived caching for hashed Vite assets
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API + Swagger UI to backend container
  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # Lightweight liveness for the nginx layer
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # SPA fallback — React Router owns the rest
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hardening
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  server_tokens off;
}
