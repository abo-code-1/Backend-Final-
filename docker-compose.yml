version: "3.9"

services:
  db:
    image: postgres:16
    container_name: roomie_kz_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: roomie_kz_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Pin the in-container listen port to 5000 so it's decoupled from the
      # root .env PORT (which is 5050 for local non-Docker runs). The host
      # mapping below exposes it on BACKEND_PORT.
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:${FRONTEND_PORT:-5173}}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run prisma:push && npm run dev"

  # Background email worker (Postgres-backed queue, no Redis).
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: roomie_kz_worker
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      CLIENT_URL: ${CLIENT_URL:-http://localhost:${FRONTEND_PORT:-5173}}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run prisma:generate && node src/worker.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: roomie_kz_frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-5000}/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
