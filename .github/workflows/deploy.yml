name: CI / CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: shanyraq-api
  NODE_VERSION: "20"

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test

  build-and-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_repo: ${{ steps.image.outputs.repo }}
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image repository
        id: image
        run: echo "repo=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.repo }}:${{ github.sha }}
            ${{ steps.image.outputs.repo }}:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p /opt/shanyraq

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/shanyraq/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_IMAGE: ${{ needs.build-and-push.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOCKER_IMAGE,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/shanyraq

            if [ ! -f .env ]; then
              echo "FATAL: /opt/shanyraq/.env not found on host. Create it before the first deploy."
              exit 1
            fi

            echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
            echo "[deploy] pulling ${DOCKER_IMAGE}:${IMAGE_TAG}"
            docker compose -f docker-compose.prod.yml pull

            echo "[deploy] bringing stack up"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "[deploy] waiting for health"
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1/health > /dev/null 2>&1; then
                echo "[deploy] healthy"
                docker image prune -f
                exit 0
              fi
              sleep 3
            done

            echo "[deploy] FAILED health check - recent logs:"
            docker compose -f docker-compose.prod.yml logs --tail=100 api
            exit 1
