openapi: 3.0.3
info:
  title: Roomie.kz API
  version: 1.0.0
  description: >
    Route-accurate API documentation for the Roomie.kz backend. All paths are
    served under `/api`; authenticate protected endpoints with a Bearer access
    token returned by register/login/refresh.
servers:
  - url: http://localhost:5050/api
    description: Local docker-compose
  - url: http://3.91.18.145:8080/api
    description: Current EC2 deployment
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Listings
  - name: Bills
  - name: Applications
  - name: Favorites
  - name: Saved Searches
  - name: Admin
  - name: Cities
  - name: Neighborhoods
  - name: Uploads
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ListingIdPath:
      name: listingId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  schemas:
    Message:
      type: object
      properties:
        message:
          type: string
    Error:
      type: object
      properties:
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        fullName:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [seeker, host, admin, super_admin]
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        occupation:
          type: string
          nullable: true
        isPhoneVerified:
          type: boolean
        isEmailVerified:
          type: boolean
        isIdVerified:
          type: boolean
        isBanned:
          type: boolean
        createdAt:
          type: string
          format: date-time
    RegisterInput:
      type: object
      required: [email, password, fullName, phone]
      properties:
        email:
          type: string
          format: email
          example: seeker@example.com
        password:
          type: string
          example: Sup3rStrong!
        fullName:
          type: string
          example: Aigerim Test
        phone:
          type: string
          example: "+77011234567"
        role:
          type: string
          enum: [seeker, host]
          example: seeker
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    UpdateProfileInput:
      type: object
      properties:
        fullName:
          type: string
        bio:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        occupation:
          type: string
        avatarUrl:
          type: string
          format: uri
    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
    SwitchRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [seeker, host]
    EmailCodeRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    EmailVerifyInput:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: "^\\d{6}$"
    ListingInput:
      type: object
      required: [title, description, city, monthlyRent, totalRooms, availableRooms, maxOccupants]
      properties:
        title:
          type: string
        description:
          type: string
        city:
          type: string
        district:
          type: string
        address:
          type: string
        monthlyRent:
          type: number
        deposit:
          type: number
        totalRooms:
          type: integer
        availableRooms:
          type: integer
        currentOccupants:
          type: integer
        maxOccupants:
          type: integer
        petsAllowed:
          type: boolean
        smokingAllowed:
          type: string
          enum: [yes, no, outside]
        genderPreference:
          type: string
          enum: [any, male, female]
        minAge:
          type: integer
        maxAge:
          type: integer
        furnished:
          type: boolean
        internetIncluded:
          type: boolean
        availableFrom:
          type: string
          format: date-time
        minStayMonths:
          type: integer
        photos:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, rented, archived]
        bills:
          type: array
          items:
            $ref: "#/components/schemas/BillInput"
        houseRules:
          type: array
          items:
            type: object
            properties:
              ruleText:
                type: string
              orderIndex:
                type: integer
    BillInput:
      type: object
      required: [label, amountKzt]
      properties:
        category:
          type: string
          enum: [rent, utilities, internet, cleaning, other]
        label:
          type: string
        amountKzt:
          type: number
        isIncludedInRent:
          type: boolean
        notes:
          type: string
    ApplicationInput:
      type: object
      properties:
        message:
          type: string
    FavoriteInput:
      type: object
      required: [listingId]
      properties:
        listingId:
          type: integer
    SavedSearchInput:
      type: object
      required: [name, filterJson]
      properties:
        name:
          type: string
        filterJson:
          type: object
          additionalProperties: true
    BanInput:
      type: object
      required: [isBanned]
      properties:
        isBanned:
          type: boolean
    AdminRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [seeker, host, admin, super_admin]
    ModerateListingInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
    ReviewVerificationInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        adminNote:
          type: string
    CityInput:
      type: object
      required: [slug, nameRu]
      properties:
        slug:
          type: string
          example: almaty
        nameRu:
          type: string
          example: Алматы
        nameKk:
          type: string
        imageUrl:
          type: string
          format: uri
        isActive:
          type: boolean
        sortOrder:
          type: integer
    NeighborhoodInput:
      type: object
      required: [cityId, name]
      properties:
        cityId:
          type: integer
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        priceLabel:
          type: string
        trendLabel:
          type: string
        tags:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer
  responses:
    OK:
      description: OK
    Created:
      description: Created
    NoContent:
      description: Deleted or completed
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing, invalid, or expired token
    Forbidden:
      description: Authenticated user lacks the required role or ownership
    NotFound:
      description: Resource not found
    Conflict:
      description: Duplicate resource or invalid state transition
    Validation:
      description: Validation failed
    ServerError:
      description: Internal server error
paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Health check plus database ping
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a seeker or host account and send email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Validation"
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and receive access plus refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Rotate refresh token and issue a new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      tags: [Auth]
      security: []
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /auth/me:
    get:
      tags: [Auth]
      summary: Return the authenticated user profile
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Auth]
      summary: Update the authenticated user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "422":
          $ref: "#/components/responses/Validation"
  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for the authenticated user and revoke sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/switch-role:
    patch:
      tags: [Auth]
      summary: Switch own role between seeker and host
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchRoleInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /auth/email/request-code:
    post:
      tags: [Auth]
      security: []
      summary: Send or resend a six-digit email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailCodeRequest"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /auth/email/verify:
    post:
      tags: [Auth]
      security: []
      summary: Verify an email address using the six-digit code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerifyInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      summary: Email a password reset link if the account exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Consume a reset token and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "400":
          $ref: "#/components/responses/BadRequest"

  /listings:
    get:
      tags: [Listings]
      security: []
      summary: Browse active listings with filters and pagination
      parameters:
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: district
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: sort
          schema:
            type: string
            enum: [newest, price_asc, price_desc]
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Listings]
      summary: Create a listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /listings/mine:
    get:
      tags: [Listings]
      summary: List listings owned by the current host; admins see all listings
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /listings/{id}:
    get:
      tags: [Listings]
      security: []
      summary: Get listing details by id
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Listings]
      summary: Update a listing owned by the user or any listing as admin
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Listings]
      summary: Delete a listing owned by the user or any listing as admin
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /listings/{listingId}/bills:
    get:
      tags: [Bills]
      security: []
      summary: List bills for a listing
      parameters:
        - $ref: "#/components/parameters/ListingIdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Bills]
      summary: Add a bill to a listing
      parameters:
        - $ref: "#/components/parameters/ListingIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /bills/{id}:
    patch:
      tags: [Bills]
      summary: Update a bill
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Bills]
      summary: Delete a bill
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /listings/{listingId}/applications:
    post:
      tags: [Applications]
      summary: Apply to a listing
      parameters:
        - $ref: "#/components/parameters/ListingIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
    get:
      tags: [Applications]
      summary: List applicants for a listing as host or admin
      parameters:
        - $ref: "#/components/parameters/ListingIdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /applications/me:
    get:
      tags: [Applications]
      summary: List the current user's applications
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /applications/{id}/withdraw:
    patch:
      tags: [Applications]
      summary: Withdraw an application
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /applications/{id}/accept:
    patch:
      tags: [Applications]
      summary: Accept an application atomically and enqueue an acceptance email
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "409":
          $ref: "#/components/responses/Conflict"
  /applications/{id}/reject:
    patch:
      tags: [Applications]
      summary: Reject an application and enqueue a rejection email
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /favorites:
    get:
      tags: [Favorites]
      summary: List current user's favorites
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Favorites]
      summary: Add a listing to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /favorites/check:
    get:
      tags: [Favorites]
      summary: Check whether a listing is favorited by the current user
      parameters:
        - in: query
          name: listingId
          required: true
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /favorites/{listingId}:
    delete:
      tags: [Favorites]
      summary: Remove a listing from favorites
      parameters:
        - $ref: "#/components/parameters/ListingIdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /saved-searches:
    get:
      tags: [Saved Searches]
      summary: List current user's saved searches
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Saved Searches]
      summary: Create a saved search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedSearchInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /admin/stats:
    get:
      tags: [Admin]
      summary: Platform counters for admin dashboard
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/users:
    get:
      tags: [Admin]
      summary: List users for admin moderation
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [seeker, host, admin, super_admin]
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/users/{id}/ban:
    patch:
      tags: [Admin]
      summary: Ban or unban a user
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Change a user's role
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRoleInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/users/{id}:
    delete:
      tags: [Admin]
      summary: Delete a user account as super_admin
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/listings/pending:
    get:
      tags: [Admin]
      summary: List listings awaiting moderation
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/listings/{id}/moderate:
    patch:
      tags: [Admin]
      summary: Approve or reject a listing
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerateListingInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/verifications/pending:
    get:
      tags: [Admin]
      summary: List pending ID verification submissions
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /admin/verifications/{id}/review:
    patch:
      tags: [Admin]
      summary: Approve or reject an ID verification
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewVerificationInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /cities:
    get:
      tags: [Cities]
      security: []
      summary: List active public cities
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Cities]
      summary: Create a city as super_admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /cities/all:
    get:
      tags: [Cities]
      summary: List all cities including inactive as super_admin
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /cities/{id}:
    patch:
      tags: [Cities]
      summary: Update a city as super_admin
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityInput"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Cities]
      summary: Delete a city as super_admin
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /neighborhoods:
    get:
      tags: [Neighborhoods]
      security: []
      summary: List active public neighborhoods
      parameters:
        - in: query
          name: cityId
          schema:
            type: integer
        - in: query
          name: citySlug
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Neighborhoods]
      summary: Create a neighborhood as super_admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NeighborhoodInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /neighborhoods/all:
    get:
      tags: [Neighborhoods]
      summary: List all neighborhoods including inactive as super_admin
      responses:
        "200":
          $ref: "#/components/responses/OK"
  /neighborhoods/{id}:
    patch:
      tags: [Neighborhoods]
      summary: Update a neighborhood as super_admin
      parameters:
