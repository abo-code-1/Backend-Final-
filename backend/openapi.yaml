openapi: 3.0.3
info:
  title: 'Roomie.kz API'
  version: 1.0.0
  description: "Backend API for **Roomie.kz** — a Kazakhstan-focused roommate / shared-room\nplatform.\n\n## Authentication\n- All non-public endpoints require a Bearer **access token** issued by\n  `POST /auth/login` or `POST /auth/register`.\n- Access tokens expire in 15 min by default; clients exchange a long-lived\n  **refresh token** at `POST /auth/refresh` to rotate the pair.\n- Logging out via `POST /auth/logout` revokes the refresh token server-side.\n\n## Roles\n- `seeker` — searches listings, applies to rooms.\n- `host`   — creates and manages listings.\n- `admin`  — moderates listings, users, and ID verifications.\n\n## Error envelope\nEvery error response body has the shape:\n```json\n{\n  \"message\": \"Human-readable summary\",\n  \"error\":   { \"code\": \"MACHINE_CODE\", \"message\": \"...\", \"details\": [...] }\n}\n```\nValidation errors additionally include an `errors` array at the top level.\n"
  contact:
    name: 'Roomie.kz Backend'
  license:
    name: MIT
servers:
  -
    url: 'http://localhost:5050/api'
    description: 'Local docker-compose (host port via BACKEND_PORT)'
  -
    url: 'http://localhost:5000/api'
    description: 'Local default (npm run dev)'
security:
  -
    bearerAuth: []
tags:
  -
    name: Health
    description: 'Liveness + DB ping'
  -
    name: Auth
    description: 'Registration, login, refresh, logout, role switch'
  -
    name: Listings
    description: 'Public browsing and host-managed listing CRUD'
  -
    name: Bills
    description: 'Per-listing recurring charges (rent, utilities, internet, ...)'
  -
    name: Applications
    description: 'Seeker → host application lifecycle (atomic accept)'
  -
    name: Favorites
    description: 'Personal listing bookmarks'
  -
    name: 'Saved Searches'
    description: 'Persisted filter sets for re-running searches'
  -
    name: Admin
    description: 'Moderation, user management, ID verification review'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      description: 'Numeric primary key'
      schema:
        type: integer
        minimum: 1
    ListingIdPath:
      in: path
      name: listingId
      required: true
      description: 'Numeric listing primary key'
      schema:
        type: integer
        minimum: 1
  schemas:
    Error:
      type: object
      required:
        - message
        - error
      properties:
        message:
          type: string
          example: 'Validation failed'
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: VALIDATION_FAILED
            message:
              type: string
              example: 'Validation failed'
            details:
              type: array
              items:
                type: object
                properties:
                  path:
                    type: string
                    example: password
                  message:
                    type: string
                    example: 'Password must contain a digit'
        errors:
          description: 'Mirror of `error.details` for legacy clients.'
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
    Message:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: OK
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com
        fullName:
          type: string
          example: 'Alice Nurlanovna'
        phone:
          type: string
          nullable: true
          example: '+77011234567'
        role:
          type: string
          enum:
            - seeker
            - host
            - admin
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        occupation:
          type: string
          nullable: true
        isPhoneVerified:
          type: boolean
        isIdVerified:
          type: boolean
        isBanned:
          type: boolean
        createdAt:
          type: string
          format: date-time
    AdminUser:
      allOf:
        -
          $ref: '#/components/schemas/User'
      description: 'User row as returned to admins (subset of the public User).'
    RegisterInput:
      type: object
      required:
        - email
        - password
        - fullName
        - phone
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          description: '8–128 chars; must include lower, upper, digit, and a symbol.'
          example: Sup3rStr0ng!
        fullName:
          type: string
          example: 'Alice Nurlanovna'
        phone:
          type: string
          description: 'E.164 format. SMS OTP is dispatched on register; verify via /auth/phone/verify-otp.'
          pattern: '^\+[1-9]\d{7,14}$'
          example: '+77011234567'
        role:
          type: string
          enum:
            - seeker
            - host
          example: seeker
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          example: Sup3rStr0ng!
    RefreshInput:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    SwitchRoleInput:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - seeker
            - host
    AuthTokens:
      type: object
      properties:
        message:
          type: string
          example: 'Logged in successfully'
        accessToken:
          type: string
          description: 'Short-lived JWT (default 15m).'
        refreshToken:
          type: string
          description: 'Long-lived rotating token (default 7d).'
        token:
          type: string
          description: 'Alias for accessToken (legacy clients).'
        user:
          $ref: '#/components/schemas/User'
    Bill:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        category:
          type: string
          enum:
            - rent
            - utilities
            - internet
            - cleaning
            - other
        label:
          type: string
          example: KazTransGaz
        amountKzt:
          type: string
          example: '8500.00'
        isIncludedInRent:
          type: boolean
        notes:
          type: string
          nullable: true
    BillInput:
      type: object
      required:
        - label
        - amountKzt
      properties:
        category:
          type: string
          enum:
            - rent
            - utilities
            - internet
            - cleaning
            - other
          default: other
        label:
          type: string
          example: Internet
        amountKzt:
          type: number
          example: 8000
        isIncludedInRent:
          type: boolean
          default: false
        notes:
          type: string
          nullable: true
    HouseRule:
      type: object
      properties:
        id:
          type: integer
        ruleText:
          type: string
          example: 'No smoking indoors'
        orderIndex:
          type: integer
          default: 0
    HouseRuleInput:
      type: object
      required:
        - ruleText
      properties:
        ruleText:
          type: string
        orderIndex:
          type: integer
    HostSummary:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        isPhoneVerified:
          type: boolean
        isIdVerified:
          type: boolean
    Listing:
      type: object
      properties:
        id:
          type: integer
          example: 17
        hostId:
          type: integer
          example: 4
        title:
          type: string
          example: 'Bright room near Almaty Mall'
        description:
          type: string
        city:
          type: string
          example: Almaty
        district:
          type: string
          nullable: true
          example: Bostandyk
        address:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        monthlyRent:
          type: string
          example: '180000.00'
        deposit:
          type: string
          nullable: true
          example: '90000.00'
        totalRooms:
          type: integer
          example: 3
        availableRooms:
          type: integer
          example: 1
        currentOccupants:
          type: integer
          example: 2
        maxOccupants:
          type: integer
          example: 3
        petsAllowed:
          type: boolean
        smokingAllowed:
          type: string
          nullable: true
          enum:
            - yes
            - no
            - outside
        genderPreference:
          type: string
          enum:
            - any
            - male
            - female
        minAge:
          type: integer
          nullable: true
        maxAge:
          type: integer
          nullable: true
        furnished:
          type: boolean
        internetIncluded:
          type: boolean
        availableFrom:
          type: string
          format: date-time
          nullable: true
        minStayMonths:
          type: integer
          nullable: true
        photos:
          type: array
          items:
            type: string
            format: uri
        status:
          type: string
          enum:
            - draft
            - active
            - rented
            - archived
        isApproved:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        host:
          $ref: '#/components/schemas/HostSummary'
        bills:
          type: array
          items:
            $ref: '#/components/schemas/Bill'
        houseRules:
          type: array
          items:
            $ref: '#/components/schemas/HouseRule'
        _count:
          type: object
          properties:
            applications:
              type: integer
            favorites:
              type: integer
    ListingInput:
      type: object
      required:
        - title
        - description
        - city
        - monthlyRent
        - totalRooms
        - availableRooms
        - maxOccupants
      properties:
        title:
          type: string
          minLength: 5
        description:
          type: string
          minLength: 10
        city:
          type: string
        district:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        monthlyRent:
          type: number
          example: 180000
        deposit:
          type: number
          example: 90000
        totalRooms:
          type: integer
          minimum: 1
        availableRooms:
          type: integer
          minimum: 1
        currentOccupants:
          type: integer
          minimum: 0
          default: 0
        maxOccupants:
          type: integer
          minimum: 1
        petsAllowed:
          type: boolean
          default: false
        smokingAllowed:
          type: string
          enum:
            - yes
            - no
            - outside
        genderPreference:
          type: string
          enum:
            - any
            - male
            - female
          default: any
        minAge:
          type: integer
        maxAge:
          type: integer
        furnished:
          type: boolean
          default: false
        internetIncluded:
          type: boolean
          default: false
        availableFrom:
          type: string
          format: date-time
          example: 2026-05-01T00:00:00.000Z
        minStayMonths:
          type: integer
        photos:
          type: array
          items:
            type: string
            format: uri
          default: []
        status:
          type: string
          enum:
            - draft
            - active
            - rented
            - archived
          default: draft
        bills:
          type: array
          items:
            $ref: '#/components/schemas/BillInput'
        houseRules:
          type: array
          items:
            $ref: '#/components/schemas/HouseRuleInput'
    ListingPagination:
      type: object
      properties:
        page:
          type: integer
          nullable: true
          example: 1
        limit:
          type: integer
          example: 12
        total:
          type: integer
          nullable: true
          example: 134
        totalPages:
          type: integer
          nullable: true
          example: 12
        nextCursor:
          type: integer
          nullable: true
          description: "Pass back as `?cursor=` for the next page (cursor pagination). When\nthe client also sends `?page=`, this is `null` once the last page\nis reached.\n"
    ListingsPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Listing'
        pagination:
          $ref: '#/components/schemas/ListingPagination'
    Application:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        seekerId:
          type: integer
        message:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - accepted
            - rejected
            - withdrawn
        createdAt:
          type: string
          format: date-time
        listing:
          description: 'Present on `GET /applications/me`.'
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
            city:
              type: string
            district:
              type: string
              nullable: true
            monthlyRent:
              type: string
    ApplicationInput:
      type: object
      properties:
        message:
          type: string
          example: 'Hi! I''m a 23 y.o. student, non-smoker.'
    Favorite:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        listingId:
          type: integer
        listing:
          $ref: '#/components/schemas/Listing'
    FavoriteInput:
      type: object
      required:
        - listingId
      properties:
        listingId:
          type: integer
    SavedSearch:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        filterJson:
          type: object
          additionalProperties: true
          example:
            city: Almaty
            maxPrice: 200000
            furnished: true
        createdAt:
          type: string
          format: date-time
    SavedSearchInput:
      type: object
      required:
        - name
        - filterJson
      properties:
        name:
          type: string
          example: 'Almaty < 200K furnished'
        filterJson:
          type: object
          additionalProperties: true
    AdminStats:
      type: object
      properties:
        users:
          type: integer
        listings:
          type: integer
        applications:
          type: integer
        pendingListings:
          type: integer
        pendingVerifications:
          type: integer
    BanInput:
      type: object
      required:
        - isBanned
      properties:
        isBanned:
          type: boolean
    AdminRoleInput:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - seeker
            - host
            - admin
    ModerateListingInput:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
    IdVerification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        imageUrl:
          type: string
          format: uri
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: integer
            fullName:
              type: string
            email:
              type: string
            isIdVerified:
              type: boolean
    ReviewVerificationInput:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - approved
            - rejected
        adminNote:
          type: string
    UpdateProfileInput:
      type: object
      minProperties: 1
      description: 'Partial profile update — at least one field must be provided.'
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 120
          example: 'Alice Nurlanovna'
        bio:
          type: string
          maxLength: 500
          nullable: true
          example: 'Tidy, quiet, early riser.'
        gender:
          type: string
          enum:
            - male
            - female
            - other
        occupation:
          type: string
          maxLength: 120
          nullable: true
          example: Designer
        avatarUrl:
          type: string
          nullable: true
          description: 'A valid URL, or an empty string to clear the avatar.'
          example: 'https://cdn.example.com/avatars/alice.jpg'
    ChangePasswordInput:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          example: Sup3rStr0ng!
        newPassword:
          type: string
          description: '8–128 chars; must include lower, upper, digit, and a symbol.'
          example: Even5tr0nger!
    SeekerSummary:
      type: object
      description: 'Compact applicant profile returned with a listing''s applications.'
      properties:
        id:
          type: integer
        fullName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        occupation:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        isPhoneVerified:
          type: boolean
        isIdVerified:
          type: boolean
    ApplicationWithSeeker:
      allOf:
        -
          $ref: '#/components/schemas/Application'
      type: object
      properties:
        seeker:
          $ref: '#/components/schemas/SeekerSummary'
  responses:
    BadRequest:
      description: 'Bad Request'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 'Unauthorized — missing or invalid access token'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 'Forbidden — role or ownership not permitted'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 'Resource not found'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: 'Conflict — duplicate or invalid state transition'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessable:
      description: 'Validation failed'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: 'Too many requests'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: 'Internal Server Error'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
paths:
  /health:
    get:
      tags:
        - Health
      security: []
      summary: 'Liveness + DB ping'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: connected
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/register:
    post:
      tags:
        - Auth
      security: []
      summary: 'Create a new user account'
      description: "Hashes the password with bcrypt (cost 12), persists the user, and\nreturns an access + refresh token pair. Rate-limited to **5 requests\nper minute per IP** (disabled in `NODE_ENV=test`).\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/login:
    post:
      tags:
        - Auth
      security: []
      summary: 'Exchange credentials for access + refresh tokens'
      description: 'Rate-limited to **5 requests per minute per IP**.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/refresh:
    post:
      tags:
        - Auth
      security: []
      summary: 'Rotate refresh token; issue a new access + refresh pair'
      description: "The refresh token is verified, hashed, and looked up in the\n`refresh_tokens` table. On success the old token is revoked and a new\npair is issued atomically — replaying the old token afterwards returns\n`401 REVOKED_REFRESH`.\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/logout:
    post:
      tags:
        - Auth
      security: []
      summary: 'Revoke a refresh token'
      description: 'Idempotent — returns 200 even if the token is unknown.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshInput'
      responses:
        '200':
          description: 'Logged out'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/me:
    get:
      tags:
        - Auth
      summary: 'Get the currently authenticated user'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags:
        - Auth
      summary: 'Update the authenticated user''s profile'
      description: "Partial update of profile fields (`fullName`, `bio`, `gender`,\n`occupation`, `avatarUrl`). At least one field must be present, or the\nrequest fails validation. Returns the updated user record.\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: 'Change the authenticated user''s password'
      description: "Verifies the current password, stores a new bcrypt hash, and revokes\nevery outstanding refresh token so other sessions must re-authenticate.\nRate-limited to **5 requests per minute per IP** (disabled in\n`NODE_ENV=test`).\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordInput'
      responses:
        '200':
          description: 'Password changed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: 'Current password is incorrect'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
